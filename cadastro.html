<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPE Sudoeste — Gerenciamento de Cadastros</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" href="favicon.ico">
<link rel="manifest" href="site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="cadastro.css">
</head>
<body>

<div class="camo-trim camo-bg"></div>

<header class="site-header">
  <div class="wrap ef-header">
    <a class="home-btn" href="index.html" title="Voltar para a página inicial">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 11l9-7 9 7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <img class="logo-cipe ef-logo-cipe" src="img/logo-cipe.png" alt="CIPE Sudoeste">
    <div class="brand-divider ef-brand-extra"></div>
    <div class="logo-pmba-chip ef-brand-extra"><img src="img/logo-pmba.png" alt="Polícia Militar da Bahia"></div>
    <div class="brand-text ef-titles">
      <div class="eyebrow ef-eyebrow">Polícia Militar · Bahia · SRHS</div>
      <div class="title ef-title">Gerenciamento de Cadastros</div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="section-label with-rule" style="margin-top:26px;">CIPE Sudoeste</div>

  <section class="ef-section" id="sec-lista">
    <div class="ef-toolbar">
      <div class="ef-toolbar-info" id="lista-info">—</div>
      <div class="lista-view-toggle">
        <button class="view-btn active" id="btn-view-cards" title="Visualizar em cards">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
        </button>
        <button class="view-btn" id="btn-view-lista" title="Visualizar em lista">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>

    <div class="lista-filtros">
      <div class="filtro-field">
        <label>Buscar</label>
        <input type="text" class="search-input" id="lista-busca" placeholder="Nome ou matrícula...">
      </div>
      <div class="filtro-field">
        <label>De</label>
        <input type="date" class="search-input" id="lista-data-de">
      </div>
      <div class="filtro-field">
        <label>Até</label>
        <input type="date" class="search-input" id="lista-data-ate">
      </div>
      <div class="filtro-field">
        <label>Ordenar por</label>
        <select class="search-input" id="lista-ordenar">
          <option value="recente">Mais recente primeiro</option>
          <option value="antigo">Mais antigo primeiro</option>
          <option value="nome-az">Nome (A-Z)</option>
          <option value="nome-za">Nome (Z-A)</option>
          <option value="qtd">Mais preenchimentos</option>
        </select>
      </div>
      <button class="ef-btn" id="btn-limpar-filtros">Limpar filtros</button>
    </div>

    <div id="lista-cadastros" class="cadastros-grid"></div>
  </section>

</div>

<footer class="site-footer">
  <div class="wrap">Gerenciamento de Cadastros — Cia Ind PE/Sudoeste — SRHS</div>
</footer>

<!-- Modal reutilizável (detalhe de um cadastro recebido) -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card" id="modal-card"></div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="cadastro-config.js"></script>
<script src="cadastro.js"></script>
</body>
</html>
